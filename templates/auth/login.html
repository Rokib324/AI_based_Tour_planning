{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – TravelAI Smart Journey Planner</title>
  <meta name="description" content="Log in to TravelAI to access your smart travel dashboard."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --navy:#0a0e2a;--navy-mid:#111433;--blue:#2563eb;--purple:#7c3aed;
      --green:#16a34a;--white:#fff;--muted:#94a3b8;--border:rgba(255,255,255,0.1);
      --card:rgba(255,255,255,0.05);
    }
    body{font-family:'Inter',sans-serif;background:var(--navy);color:var(--white);min-height:100vh;display:flex;flex-direction:column;}
    /* BG */
    .bg-wrap{position:fixed;inset:0;z-index:0;overflow:hidden;}
    .bg-wrap img{width:100%;height:100%;object-fit:cover;opacity:.18;}
    .bg-overlay{position:absolute;inset:0;background:linear-gradient(135deg,rgba(10,14,42,.97) 0%,rgba(17,20,51,.92) 100%);}
    /* Orbs */
    .orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.35;pointer-events:none;}
    .orb1{width:400px;height:400px;background:radial-gradient(circle,#2563eb,transparent);top:-100px;right:-100px;}
    .orb2{width:300px;height:300px;background:radial-gradient(circle,#7c3aed,transparent);bottom:-80px;left:-80px;}

    /* NAV */
    nav{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:18px 40px;border-bottom:1px solid var(--border);}
    .logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
    .logo-icon{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,#2563eb,#7c3aed);display:grid;place-items:center;font-size:18px;}
    .logo-brand{font-weight:800;font-size:17px;}
    .logo-tag{font-size:10px;color:var(--muted);}
    .back-link{font-size:13px;color:var(--muted);text-decoration:none;display:flex;align-items:center;gap:6px;transition:color .2s;}
    .back-link:hover{color:var(--white);}

    /* CARD */
    main{position:relative;z-index:10;flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px;}
    .card{background:rgba(255,255,255,0.06);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:24px;padding:40px 36px;width:100%;max-width:420px;box-shadow:0 30px 80px rgba(0,0,0,.4);}
    .card-title{font-size:26px;font-weight:800;margin-bottom:4px;}
    .card-sub{font-size:14px;color:var(--muted);margin-bottom:28px;}

    /* Social buttons */
    .social-btns{display:flex;flex-direction:column;gap:10px;margin-bottom:22px;}
    .social-btn{display:flex;align-items:center;justify-content:center;gap:10px;padding:12px;border-radius:12px;font-weight:600;font-size:14px;cursor:pointer;border:1.5px solid var(--border);background:rgba(255,255,255,0.06);color:var(--white);text-decoration:none;transition:background .2s,border-color .2s;}
    .social-btn:hover{background:rgba(255,255,255,0.12);border-color:rgba(255,255,255,.25);}
    .social-btn svg{width:20px;height:20px;flex-shrink:0;}
    .social-btn.google{border-color:rgba(234,67,53,.5);}
    .social-btn.facebook{border-color:rgba(24,119,242,.5);}

    /* Divider */
    .divider{display:flex;align-items:center;gap:12px;margin-bottom:22px;color:var(--muted);font-size:13px;}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}

    /* Form */
    .form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;}
    label{font-size:13px;font-weight:600;color:#cbd5e1;}
    .input-wrap{position:relative;}
    .input-wrap .icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none;}
    input[type=text],input[type=email],input[type=password]{
      width:100%;padding:12px 14px 12px 40px;background:rgba(255,255,255,0.07);
      border:1.5px solid var(--border);border-radius:12px;color:var(--white);
      font-family:'Inter',sans-serif;font-size:14px;outline:none;
      transition:border-color .2s,background .2s;
    }
    input:focus{border-color:var(--blue);background:rgba(37,99,235,0.08);}
    input::placeholder{color:var(--muted);}
    .forgot-link{text-align:right;margin-top:-8px;margin-bottom:8px;}
    .forgot-link a{font-size:12px;color:#93c5fd;text-decoration:none;}
    .forgot-link a:hover{text-decoration:underline;}
    .btn-submit{width:100%;padding:13px;background:linear-gradient(135deg,#2563eb,#7c3aed);color:#fff;border:none;border-radius:12px;font-weight:700;font-size:15px;cursor:pointer;margin-top:4px;transition:opacity .2s,transform .15s;}
    .btn-submit:hover{opacity:.88;transform:translateY(-1px);}
    .register-link{text-align:center;margin-top:18px;font-size:13px;color:var(--muted);}
    .register-link a{color:#93c5fd;text-decoration:none;font-weight:600;}

    /* Alert */
    .alert{display:none;padding:12px 14px;border-radius:10px;font-size:13px;margin-bottom:16px;}
    .alert.error{background:rgba(220,38,38,.15);border:1px solid rgba(220,38,38,.3);color:#fca5a5;}
    .alert.success{background:rgba(22,163,74,.15);border:1px solid rgba(22,163,74,.3);color:#86efac;}
    .spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px;}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<div class="bg-wrap">
  <img src="{% static 'images/hero_bg.png' %}" alt=""/>
  <div class="bg-overlay"></div>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
</div>

<nav>
  <a class="logo" href="/">
    <div class="logo-icon">✈️</div>
    <div><div class="logo-brand">TravelAI</div><div class="logo-tag">Smart Journey Planner</div></div>
  </a>
  <a class="back-link" href="/">← Back to Home</a>
</nav>

<main>
  <div class="card">
    <div class="card-title">Welcome back 👋</div>
    <div class="card-sub">Sign in to your TravelAI account</div>

    <div id="alert-box" class="alert"></div>

    <!-- Social Login -->
    <div class="social-btns">
      <div id="google-signin-btn" style="width:100%;display:flex;justify-content:center;"></div>
    </div>

    <div class="divider">or sign in with email</div>

    <!-- Email/Password Form -->
    <form id="login-form" onsubmit="loginWithEmail(event)">
      <div class="form-group">
        <label for="login-username">Username or Email</label>
        <div class="input-wrap">
          <span class="icon">👤</span>
          <input type="text" id="login-username" placeholder="Enter your username" required/>
        </div>
      </div>
      <div class="form-group">
        <label for="login-password">Password</label>
        <div class="input-wrap">
          <span class="icon">🔒</span>
          <input type="password" id="login-password" placeholder="Enter your password" required/>
        </div>
      </div>
      <div class="forgot-link"><a href="/auth/forgot-password/">Forgot password?</a></div>
      <button class="btn-submit" id="login-btn" type="submit">Sign In</button>
    </form>

    <div class="register-link">
      Don't have an account? <a href="/auth/register/">Create one free →</a>
    </div>
  </div>
</main>

<script>
  window.GOOGLE_CLIENT_ID = '{{ GOOGLE_CLIENT_ID|escapejs }}';
</script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="{% static 'js/auth.js' %}"></script>
<script>
  const API = '/api/users';

  function showAlert(msg, type='error') {
    const el = document.getElementById('alert-box');
    el.textContent = msg;
    el.className = `alert ${type}`;
    el.style.display = 'block';
  }

  window.addEventListener('DOMContentLoaded', () => {
    if (TravelAuth.getAccessToken()) {
      TravelAuth.fetchProfile().then(user => {
        if (user) TravelAuth.redirectToRoleDashboard(user.role);
      });
    }
    window.addEventListener('load', () => {
      TravelAuth.initGoogleSignIn('google-signin-btn', (msg) => showAlert(msg));
    });
  });

  async function loginWithEmail(e) {
    e.preventDefault();
    const btn = document.getElementById('login-btn');
    btn.innerHTML = '<span class="spinner"></span>Signing in…';
    btn.disabled = true;
    const username = document.getElementById('login-username').value;
    const password = document.getElementById('login-password').value;
    try {
      const res = await fetch(`${API}/login/`, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({username, password}),
      });
      const data = await res.json();
      if (res.ok) {
        TravelAuth.storeSession(data);
        showAlert('Login successful! Redirecting…', 'success');
        setTimeout(() => TravelAuth.redirectToRoleDashboard(data.user.role), 800);
      } else {
        showAlert(data.detail || 'Invalid credentials. Please try again.');
        btn.innerHTML = 'Sign In'; btn.disabled = false;
      }
    } catch(err) {
      showAlert('Network error. Please try again.'); btn.innerHTML = 'Sign In'; btn.disabled = false;
    }
  }
</script>
</body>
</html>
