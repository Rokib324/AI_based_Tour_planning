{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forgot Password – TravelAI</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:#0a0e2a;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
    .card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:36px;width:100%;max-width:420px;}
    h1{font-size:24px;font-weight:800;margin-bottom:6px;}
    p{color:#94a3b8;font-size:14px;margin-bottom:24px;line-height:1.5;}
    label{font-size:13px;font-weight:600;display:block;margin-bottom:6px;}
    input{width:100%;padding:12px 14px;background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.1);border-radius:12px;color:#fff;font-size:14px;margin-bottom:16px;}
    input:focus{outline:none;border-color:#2563eb;}
    button{width:100%;padding:13px;background:linear-gradient(135deg,#2563eb,#7c3aed);color:#fff;border:none;border-radius:12px;font-weight:700;cursor:pointer;}
    .alert{display:none;padding:12px;border-radius:10px;font-size:13px;margin-bottom:14px;}
    .alert.error{background:rgba(220,38,38,.15);color:#fca5a5;}
    .alert.success{background:rgba(22,163,74,.15);color:#86efac;}
    .back{display:block;text-align:center;margin-top:18px;color:#93c5fd;font-size:13px;text-decoration:none;}
  </style>
</head>
<body>
  <div class="card">
    <h1>Reset your password</h1>
    <p>Enter your email address and we'll send you a reset link via Gmail.</p>
    <div id="alert" class="alert"></div>
    <form id="form">
      <label for="email">Email address</label>
      <input type="email" id="email" placeholder="you@example.com" required/>
      <button type="submit" id="btn">Send Reset Link</button>
    </form>
    <a class="back" href="/auth/login/">← Back to login</a>
  </div>
  <script>
    const form = document.getElementById('form');
    const alertEl = document.getElementById('alert');
    function showAlert(msg, type) {
      alertEl.textContent = msg;
      alertEl.className = `alert ${type}`;
      alertEl.style.display = 'block';
    }
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btn');
      btn.disabled = true;
      btn.textContent = 'Sending…';
      try {
        const res = await fetch('/api/users/password/reset/', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ email: document.getElementById('email').value }),
        });
        const data = await res.json();
        if (res.ok) {
          showAlert(data.message || 'Check your email for the reset link.', 'success');
          form.reset();
        } else {
          showAlert(Object.values(data).flat().join(' ') || 'Request failed.');
        }
      } catch {
        showAlert('Network error. Please try again.');
      }
      btn.disabled = false;
      btn.textContent = 'Send Reset Link';
    });
  </script>
</body>
</html>
