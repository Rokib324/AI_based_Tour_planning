{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register – TravelAI Smart Journey Planner</title>
  <meta name="description" content="Create your TravelAI account and start planning smart journeys."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--navy:#0a0e2a;--blue:#2563eb;--purple:#7c3aed;--green:#16a34a;--white:#fff;--muted:#94a3b8;--border:rgba(255,255,255,0.1);}
    body{font-family:'Inter',sans-serif;background:var(--navy);color:var(--white);min-height:100vh;display:flex;flex-direction:column;}
    .bg-wrap{position:fixed;inset:0;z-index:0;overflow:hidden;}
    .bg-wrap img{width:100%;height:100%;object-fit:cover;opacity:.14;}
    .bg-overlay{position:absolute;inset:0;background:linear-gradient(135deg,rgba(10,14,42,.97),rgba(17,20,51,.95));}
    .orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.3;pointer-events:none;}
    .orb1{width:350px;height:350px;background:radial-gradient(circle,#7c3aed,transparent);top:-80px;left:-80px;}
    .orb2{width:300px;height:300px;background:radial-gradient(circle,#2563eb,transparent);bottom:-60px;right:-60px;}
    nav{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:18px 40px;border-bottom:1px solid var(--border);}
    .logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
    .logo-icon{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,#2563eb,#7c3aed);display:grid;place-items:center;font-size:18px;}
    .logo-brand{font-weight:800;font-size:17px;}
    .logo-tag{font-size:10px;color:var(--muted);}
    .back-link{font-size:13px;color:var(--muted);text-decoration:none;display:flex;align-items:center;gap:6px;transition:color .2s;}
    .back-link:hover{color:var(--white);}
    main{position:relative;z-index:10;flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px;}
    .card{background:rgba(255,255,255,0.06);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:24px;padding:36px;width:100%;max-width:480px;box-shadow:0 30px 80px rgba(0,0,0,.4);}
    .card-title{font-size:24px;font-weight:800;margin-bottom:4px;}
    .card-sub{font-size:14px;color:var(--muted);margin-bottom:24px;}
    .social-btns{display:flex;gap:10px;margin-bottom:20px;}
    .social-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:11px;border-radius:12px;font-weight:600;font-size:13px;cursor:pointer;border:1.5px solid var(--border);background:rgba(255,255,255,0.06);color:var(--white);text-decoration:none;transition:background .2s;}
    .social-btn:hover{background:rgba(255,255,255,0.12);}
    .social-btn svg{width:18px;height:18px;}
    .divider{display:flex;align-items:center;gap:12px;margin-bottom:20px;color:var(--muted);font-size:13px;}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
    .form-group{display:flex;flex-direction:column;gap:5px;margin-bottom:14px;}
    label{font-size:12px;font-weight:600;color:#cbd5e1;text-transform:uppercase;letter-spacing:.3px;}
    .input-wrap{position:relative;}
    .input-wrap .icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:15px;pointer-events:none;}
    input[type=text],input[type=email],input[type=password],select{
      width:100%;padding:11px 12px 11px 38px;background:rgba(255,255,255,0.07);
      border:1.5px solid var(--border);border-radius:10px;color:var(--white);
      font-family:'Inter',sans-serif;font-size:14px;outline:none;transition:border-color .2s;
    }
    select{-webkit-appearance:none;padding-left:38px;}
    input:focus,select:focus{border-color:var(--blue);}
    input::placeholder{color:var(--muted);}
    .btn-submit{width:100%;padding:13px;background:linear-gradient(135deg,#2563eb,#7c3aed);color:#fff;border:none;border-radius:12px;font-weight:700;font-size:15px;cursor:pointer;margin-top:6px;transition:opacity .2s,transform .15s;}
    .btn-submit:hover{opacity:.88;transform:translateY(-1px);}
    .login-link{text-align:center;margin-top:16px;font-size:13px;color:var(--muted);}
    .login-link a{color:#93c5fd;text-decoration:none;font-weight:600;}
    .alert{display:none;padding:11px 14px;border-radius:10px;font-size:13px;margin-bottom:14px;}
    .alert.error{background:rgba(220,38,38,.15);border:1px solid rgba(220,38,38,.3);color:#fca5a5;}
    .alert.success{background:rgba(22,163,74,.15);border:1px solid rgba(22,163,74,.3);color:#86efac;}
    .spinner{display:inline-block;width:15px;height:15px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px;}
    @keyframes spin{to{transform:rotate(360deg)}}
    .pass-strength{display:flex;gap:4px;margin-top:6px;}
    .pass-strength span{flex:1;height:3px;border-radius:2px;background:rgba(255,255,255,.12);transition:background .3s;}
    .ps-1{background:#ef4444!important;} .ps-2{background:#f59e0b!important;} .ps-3{background:#22c55e!important;}
  </style>
</head>
<body>
<div class="bg-wrap">
  <img src="{% static 'images/hero_bg.png' %}" alt=""/>
  <div class="bg-overlay"></div>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
</div>
<nav>
  <a class="logo" href="/"><div class="logo-icon">✈️</div><div><div class="logo-brand">TravelAI</div><div class="logo-tag">Smart Journey Planner</div></div></a>
  <a class="back-link" href="/auth/login/">← Already have an account?</a>
</nav>
<main>
  <div class="card">
    <div class="card-title">Create account 🚀</div>
    <div class="card-sub">Join thousands of smart travelers worldwide</div>

    <div id="alert-box" class="alert"></div>

    <div class="social-btns">
      <div id="google-signin-btn" style="width:100%;display:flex;justify-content:center;"></div>
    </div>

    <div class="divider">or register with email</div>

    <form id="register-form" onsubmit="registerWithEmail(event)">
      <div class="form-row">
        <div class="form-group">
          <label>First Name</label>
          <div class="input-wrap"><span class="icon">👤</span><input type="text" id="reg-first" placeholder="John"/></div>
        </div>
        <div class="form-group">
          <label>Last Name</label>
          <div class="input-wrap"><span class="icon">👤</span><input type="text" id="reg-last" placeholder="Doe"/></div>
        </div>
      </div>
      <div class="form-group">
        <label>Username *</label>
        <div class="input-wrap"><span class="icon">🪪</span><input type="text" id="reg-username" placeholder="johndoe123" required/></div>
      </div>
      <div class="form-group">
        <label>Email Address *</label>
        <div class="input-wrap"><span class="icon">📧</span><input type="email" id="reg-email" placeholder="john@example.com" required/></div>
      </div>
      <div class="form-group">
        <label>Phone Number</label>
        <div class="input-wrap"><span class="icon">📱</span><input type="text" id="reg-phone" placeholder="+44 7700 900000"/></div>
      </div>
      <div class="form-group">
        <label>Password *</label>
        <div class="input-wrap"><span class="icon">🔒</span><input type="password" id="reg-password" placeholder="Min. 8 characters" required oninput="checkStrength(this.value)"/></div>
        <div class="pass-strength"><span id="ps1"></span><span id="ps2"></span><span id="ps3"></span><span id="ps4"></span></div>
      </div>
      <button class="btn-submit" id="reg-btn" type="submit">Create Account</button>
    </form>
    <div class="login-link">Already have an account? <a href="/auth/login/">Sign in →</a></div>
  </div>
</main>
<script>
  window.GOOGLE_CLIENT_ID = '{{ GOOGLE_CLIENT_ID|escapejs }}';
</script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="{% static 'js/auth.js' %}"></script>
<script>
  const API = '/api/users';
  function showAlert(msg, type='error') {
    const el = document.getElementById('alert-box');
    el.textContent = msg; el.className = `alert ${type}`; el.style.display = 'block';
  }
  window.addEventListener('load', () => {
    TravelAuth.initGoogleSignIn('google-signin-btn', (msg) => showAlert(msg));
  });
  function checkStrength(v) {
    const bars = [document.getElementById('ps1'),document.getElementById('ps2'),document.getElementById('ps3'),document.getElementById('ps4')];
    bars.forEach(b => b.className = '');
    let score = 0;
    if(v.length >= 8) score++;
    if(/[A-Z]/.test(v)) score++;
    if(/[0-9]/.test(v)) score++;
    if(/[^A-Za-z0-9]/.test(v)) score++;
    const cls = score <= 1 ? 'ps-1' : score <= 2 ? 'ps-2' : 'ps-3';
    for(let i=0;i<score;i++) bars[i].className = cls;
  }
  async function registerWithEmail(e) {
    e.preventDefault();
    const btn = document.getElementById('reg-btn');
    btn.innerHTML = '<span class="spinner"></span>Creating account…'; btn.disabled = true;
    const body = {
      username: document.getElementById('reg-username').value,
      email:    document.getElementById('reg-email').value,
      password: document.getElementById('reg-password').value,
      first_name: document.getElementById('reg-first').value,
      last_name:  document.getElementById('reg-last').value,
      phone_number: document.getElementById('reg-phone').value,
    };
    try {
      const res = await fetch(`${API}/register/`, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
      const data = await res.json();
      if(res.ok) {
        TravelAuth.storeSession(data);
        localStorage.setItem('pending_verify_email', body.email);
        showAlert('Account created! Check your email for a verification code.', 'success');
        setTimeout(() => window.location.href = `/auth/verify-email/?email=${encodeURIComponent(body.email)}`, 1500);
      } else {
        const msgs = Object.values(data).flat().join(' ');
        showAlert(msgs || 'Registration failed. Please try again.');
        btn.innerHTML = 'Create Account'; btn.disabled = false;
      }
    } catch(err) {
      showAlert('Network error.'); btn.innerHTML = 'Create Account'; btn.disabled = false;
    }
  }
</script>
</body>
</html>
