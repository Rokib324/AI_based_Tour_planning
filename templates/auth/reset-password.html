{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password – TravelAI</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:#0a0e2a;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
    .card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:36px;width:100%;max-width:420px;}
    h1{font-size:24px;font-weight:800;margin-bottom:6px;}
    p{color:#94a3b8;font-size:14px;margin-bottom:24px;}
    label{font-size:13px;font-weight:600;display:block;margin-bottom:6px;}
    input{width:100%;padding:12px 14px;background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.1);border-radius:12px;color:#fff;font-size:14px;margin-bottom:16px;}
    button{width:100%;padding:13px;background:linear-gradient(135deg,#2563eb,#7c3aed);color:#fff;border:none;border-radius:12px;font-weight:700;cursor:pointer;}
    .alert{display:none;padding:12px;border-radius:10px;font-size:13px;margin-bottom:14px;}
    .alert.error{background:rgba(220,38,38,.15);color:#fca5a5;}
    .alert.success{background:rgba(22,163,74,.15);color:#86efac;}
    .back{display:block;text-align:center;margin-top:18px;color:#93c5fd;font-size:13px;text-decoration:none;}
  </style>
</head>
<body>
  <div class="card">
    <h1>Set new password</h1>
    <p>Choose a strong password with at least 8 characters.</p>
    <div id="alert" class="alert"></div>
    <form id="form">
      <label for="password">New password</label>
      <input type="password" id="password" minlength="8" required placeholder="Min. 8 characters"/>
      <label for="confirm">Confirm password</label>
      <input type="password" id="confirm" minlength="8" required placeholder="Repeat password"/>
      <button type="submit" id="btn">Update Password</button>
    </form>
    <a class="back" href="/auth/login/">← Back to login</a>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');
    const alertEl = document.getElementById('alert');

    function showAlert(msg, type) {
      alertEl.textContent = msg;
      alertEl.className = `alert ${type}`;
      alertEl.style.display = 'block';
    }

    if (!token) {
      showAlert('Invalid or missing reset token. Request a new link.', 'error');
      document.getElementById('form').style.display = 'none';
    }

    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;
      if (password !== confirm) {
        showAlert('Passwords do not match.', 'error');
        return;
      }
      const btn = document.getElementById('btn');
      btn.disabled = true;
      btn.textContent = 'Updating…';
      try {
        const res = await fetch('/api/users/password/reset/confirm/', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ token, new_password: password }),
        });
        const data = await res.json();
        if (res.ok) {
          showAlert(data.message || 'Password updated! Redirecting to login…', 'success');
          setTimeout(() => window.location.href = '/auth/login/', 2000);
        } else {
          showAlert(data.token?.[0] || data.new_password?.[0] || 'Reset failed.');
        }
      } catch {
        showAlert('Network error. Please try again.');
      }
      btn.disabled = false;
      btn.textContent = 'Update Password';
    });
  </script>
</body>
</html>
