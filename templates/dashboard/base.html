{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Dashboard{% endblock %} – TravelAI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0a0e2a;--bg2:#111433;--blue:#2563eb;--purple:#7c3aed;
      --green:#16a34a;--amber:#f59e0b;--rose:#ef4444;
      --white:#fff;--muted:#94a3b8;--border:rgba(255,255,255,.08);
      --card:rgba(255,255,255,.04);
    }
    body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,var(--bg),var(--bg2));color:var(--white);min-height:100vh;display:flex;}
    .sidebar{width:260px;min-height:100vh;background:rgba(0,0,0,.25);border-right:1px solid var(--border);padding:24px 18px;display:flex;flex-direction:column;flex-shrink:0;}
    .logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--white);margin-bottom:32px;}
    .logo-icon{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,var(--blue),var(--purple));display:grid;place-items:center;font-size:18px;}
    .logo h1{font-size:17px;font-weight:800;}
    .logo p{font-size:10px;color:var(--muted);}
    .nav{list-style:none;flex:1;}
    .nav li{margin-bottom:4px;}
    .nav a{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:10px;color:var(--muted);text-decoration:none;font-size:14px;font-weight:500;transition:background .2s,color .2s;}
    .nav a:hover,.nav a.active{background:rgba(37,99,235,.15);color:var(--white);}
    .nav a i{width:18px;text-align:center;}
    .user-card{margin-top:auto;padding:14px;background:var(--card);border:1px solid var(--border);border-radius:14px;}
    .user-top{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
    .avatar{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--blue),var(--purple));display:grid;place-items:center;font-weight:700;}
    .user-name{font-weight:600;font-size:14px;}
    .user-role{font-size:11px;color:var(--muted);text-transform:capitalize;}
    .btn-logout{width:100%;padding:9px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;}
    .btn-logout:hover{background:rgba(239,68,68,.12);color:#fca5a5;border-color:rgba(239,68,68,.3);}
    .main{flex:1;padding:28px 32px;overflow-y:auto;}
    .page-header{margin-bottom:28px;}
    .page-header h2{font-size:26px;font-weight:800;margin-bottom:6px;}
    .page-header p{color:var(--muted);font-size:14px;}
    .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:28px;}
    .stat-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;}
    .stat-card .label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px;}
    .stat-card .value{font-size:28px;font-weight:800;}
    .stat-card .icon{font-size:22px;margin-bottom:10px;opacity:.8;}
    .panel{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:20px;}
    .panel h3{font-size:16px;font-weight:700;margin-bottom:14px;}
    .badge{display:inline-block;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;text-transform:capitalize;}
    .badge-draft{background:rgba(148,163,184,.2);color:#cbd5e1;}
    .badge-submitted_logistics{background:rgba(245,158,11,.2);color:#fcd34d;}
    .badge-pending_finance{background:rgba(59,130,246,.2);color:#93c5fd;}
    .badge-approved{background:rgba(22,163,74,.2);color:#86efac;}
    .badge-rejected{background:rgba(239,68,68,.2);color:#fca5a5;}
    .badge-paid{background:rgba(124,58,237,.2);color:#c4b5fd;}
    table{width:100%;border-collapse:collapse;font-size:13px;}
    th{text-align:left;padding:10px 12px;color:var(--muted);font-weight:600;border-bottom:1px solid var(--border);}
    td{padding:12px;border-bottom:1px solid var(--border);}
    tr:last-child td{border-bottom:none;}
    .empty{color:var(--muted);font-size:14px;padding:20px 0;text-align:center;}
    .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px;}
    .btn{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:600;text-decoration:none;border:none;cursor:pointer;}
    .btn-primary{background:linear-gradient(135deg,var(--blue),var(--purple));color:#fff;}
    .btn-secondary{background:rgba(255,255,255,.06);color:var(--white);border:1px solid var(--border);}
    .loading{text-align:center;padding:40px;color:var(--muted);}
    @media(max-width:900px){
      body{flex-direction:column;}
      .sidebar{width:100%;min-height:auto;}
    }
  </style>
  {% block extra_css %}{% endblock %}
</head>
<body>
  <aside class="sidebar">
    <a class="logo" href="/">
      <div class="logo-icon">✈️</div>
      <div><h1>TravelAI</h1><p>{% block role_label %}Dashboard{% endblock %}</p></div>
    </a>
    <ul class="nav">
      {% block nav_items %}{% endblock %}
    </ul>
    <div class="user-card">
      <div class="user-top">
        <div class="avatar" id="user-avatar">?</div>
        <div>
          <div class="user-name" id="user-name">Loading…</div>
          <div class="user-role" id="user-role">—</div>
        </div>
      </div>
      <button class="btn-logout" onclick="TravelAuth.logout()">
        <i class="fa-solid fa-right-from-bracket"></i> Logout
      </button>
    </div>
  </aside>
  <main class="main">
    {% block content %}{% endblock %}
  </main>
  <script src="{% static 'js/auth.js' %}"></script>
  <script>
    const EXPECTED_ROLE = '{% block expected_role %}{% endblock %}';

    function statusBadge(status) {
      return `<span class="badge badge-${status}">${status.replace(/_/g, ' ')}</span>`;
    }

    function formatMoney(amount) {
      return '$' + Number(amount || 0).toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
    }

    async function initDashboard() {
      const user = await TravelAuth.requireAuth(EXPECTED_ROLE || null);
      if (!user) return;

      const displayName = user.first_name
        ? `${user.first_name} ${user.last_name || ''}`.trim()
        : user.username;
      document.getElementById('user-name').textContent = displayName;
      document.getElementById('user-role').textContent = user.role.replace(/_/g, ' ');
      document.getElementById('user-avatar').textContent = displayName.charAt(0).toUpperCase();

      if (typeof loadRoleData === 'function') {
        await loadRoleData(user);
      }
    }

    window.addEventListener('DOMContentLoaded', initDashboard);
  </script>
  {% block extra_js %}{% endblock %}
</body>
</html>
